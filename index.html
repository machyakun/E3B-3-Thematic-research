<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GitHubファイル投稿デモ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #content { 
            white-space: pre-wrap; 
            background: #f4f4f4; 
            padding: 15px; 
            border-radius: 5px; 
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h2>GitHubから取得したファイル中身</h2>
    <div id="content">読み込み中...</div>

    <script>
        // 設定情報
        const OWNER = 'あなたのGitHubユーザー名';
        const REPO = 'リポジトリ名';
        const PATH = 'ファイル名.txt'; // フォルダ内なら 'folder/file.txt'
        const TOKEN = 'あなたのGitHub個人アクセストークン'; // ※注意：公開サイトでは隠す必要があります

        // GitHub APIのURL
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

        async function fetchGitHubFile() {
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        // プライベートリポジトリや回数制限対策にトークンが必要な場合のみ以下を有効化
                        'Authorization': `token ${TOKEN}`, 
                        'Accept': 'application/vnd.github.v3.raw' // これを指定すると中身をテキストで直接取得できます
                    }
                });

                if (!response.ok) {
                    throw new Error(`エラーが発生しました: ${response.status}`);
                }

                // テキストとしてパース
                const data = await response.text();
                
                // 画面に表示
                document.getElementById('content').textContent = data;

            } catch (error) {
                console.error('読み込み失敗:', error);
                document.getElementById('content').textContent = 'ファイルの取得に失敗しました。';
            }
        }

        // ページ読み込み時に実行
        fetchGitHubFile();
    </script>
</body>
</html>
