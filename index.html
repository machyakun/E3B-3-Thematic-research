<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GitHubファイル表示テスト</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #content-area { 
            background: #f5f5f5; 
            padding: 15px; 
            border-radius: 5px; 
            white-space: pre-wrap; /* 改行を有効にする設定 */
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h2>GitHubから取得したコンテンツ</h2>
    <div id="content-area">読み込み中...</div>

    <script>
        // 1. あなたのGitHub情報に書き換えてください
        const OWNER = 'あなたのユーザー名';
        const REPO = 'リポジトリ名';
        const PATH = 'ファイル名（例: sample.txt）';

        // GitHub APIのURL（公開リポジトリ用）
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

        async function fetchGitHubFile() {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('ファイルの取得に失敗しました。');
                }
                
                const data = await response.json();

                // APIから取得したデータはBase64という形式でエンコードされているため、デコードする
                // 日本語の文字化けを防ぐためのデコード処理
                const decodedContent = decodeURIComponent(escape(atob(data.content)));

                // 画面に表示
                document.getElementById('content-area').textContent = decodedContent;

            } catch (error) {
                console.error('エラー:', error);
                document.getElementById('content-area').textContent = 'データの読み込みに失敗しました。';
            }
        }

        // ページが読み込まれたら実行
        fetchGitHubFile();
    </script>
</body>
</html>
